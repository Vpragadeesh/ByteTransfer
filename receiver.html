<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📥</text></svg>" />
    <title>📥 LocalShare - File Receiver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #252525 100%);
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .container {
        max-width: 1000px;
        margin: 50px auto;
        background-color: #1e1e1e;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        border: 1px solid #333333;
        padding: 30px;
        box-sizing: border-box;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      h1 {
        color: #e2e8f0;
        font-size: 2em;
        margin-bottom: 10px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      }

      .subtitle {
        color: #94a3b8;
        font-size: 14px;
      }

      .link-input-section {
        margin-bottom: 30px;
        padding: 20px;
        background-color: #2a2a2a;
        border-radius: 12px;
        border: 1px solid #404040;
      }

      .link-input-container {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-bottom: 15px;
      }

      .link-input {
        width: 100%;
        padding: 12px 15px;
        background: #353535;
        border: 1px solid #404040;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: "Courier New", monospace;
      }

      .link-input:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .btn {
        padding: 12px 24px;
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 8px rgba(59, 130, 246, 0.3);
        font-weight: 500;
        white-space: nowrap;
      }

      .btn:hover {
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(59, 130, 246, 0.4);
      }

      .btn:disabled {
        background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-secondary {
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        box-shadow: 0 4px 8px rgba(139, 92, 246, 0.3);
      }

      .btn-secondary:hover {
        background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
        box-shadow: 0 6px 12px rgba(139, 92, 246, 0.4);
      }

      .or-divider {
        text-align: center;
        color: #94a3b8;
        font-size: 12px;
        margin: 15px 0;
      }

      .qr-section {
        text-align: center;
      }

      .qr-scanner-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 8px rgba(6, 182, 212, 0.3);
        font-weight: 500;
      }

      .qr-scanner-btn:hover {
        background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(6, 182, 212, 0.4);
      }

      .connection-status {
        margin-bottom: 20px;
        padding: 15px;
        border-radius: 8px;
        display: none;
        font-size: 14px;
        align-items: center;
        gap: 10px;
      }

      .status-icon {
        font-size: 20px;
      }

      .status-text {
        flex: 1;
      }

      .connection-status.loading {
        background-color: #2a3e5f;
        border: 1px solid #3b82f6;
        color: #93c5fd;
        display: flex;
      }

      .connection-status.success {
        background-color: #064e3b;
        border: 1px solid #10b981;
        color: #a7f3d0;
        display: flex;
      }

      .connection-status.error {
        background-color: #7f1d1d;
        border: 1px solid #ef4444;
        color: #fecaca;
        display: flex;
      }

      .files-section {
        margin-top: 30px;
      }

      .files-section h2 {
        color: #e2e8f0;
        margin-bottom: 15px;
        font-size: 1.4em;
      }

      .files-grid {
        display: grid;
        gap: 12px;
      }

      .file-card {
        background: #2a2a2a;
        border: 1px solid #404040;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s ease;
      }

      .file-card:hover {
        background-color: #353535;
        border-color: #606060;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
      }

      .file-info {
        flex: 1;
        min-width: 0;
      }

      .file-name {
        color: #e2e8f0;
        font-size: 15px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-bottom: 5px;
      }

      .file-meta {
        font-size: 12px;
        color: #94a3b8;
        display: flex;
        gap: 15px;
      }

      .file-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
        margin-left: 10px;
      }

      .download-btn {
        padding: 8px 16px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
        white-space: nowrap;
      }

      .download-btn:hover {
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(16, 185, 129, 0.4);
      }

      .download-btn:disabled {
        background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .progress-container {
        margin-top: 20px;
        padding: 20px;
        background-color: #2a2a2a;
        border: 1px solid #404040;
        border-radius: 8px;
        display: none;
      }

      .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .progress-title {
        color: #e2e8f0;
        font-size: 14px;
        font-weight: 500;
      }

      .progress-cancel {
        background: #404040;
        color: #e2e8f0;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.3s ease;
      }

      .progress-cancel:hover {
        background: #505050;
      }

      .progress-bar {
        width: 100%;
        height: 20px;
        background-color: #353535;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
        border: 1px solid #404040;
        margin-bottom: 10px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6 0%, #06b6d4 50%, #10b981 100%);
        width: 0%;
        transition: width 0.3s ease;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
      }

      .progress-text {
        text-align: center;
        font-size: 13px;
        color: #e2e8f0;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .progress-details {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 8px;
      }

      .progress-size {
        font-weight: 500;
        color: #cbd5e1;
      }

      .progress-speed {
        font-weight: 500;
        color: #06b6d4;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #94a3b8;
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      .empty-state-text {
        font-size: 15px;
        margin-bottom: 10px;
      }

      .empty-state-hint {
        font-size: 13px;
        color: #64748b;
      }

      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        color: white;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 4px 8px rgba(139, 92, 246, 0.3);
        transition: all 0.3s ease;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 6px 12px rgba(139, 92, 246, 0.4);
        background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      }

      .theme-toggle-icon {
        width: 24px;
        height: 24px;
        transition: transform 0.3s ease;
      }

      .theme-toggle-icon svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .info-box {
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid rgba(59, 130, 246, 0.3);
        font-size: 13px;
        color: #e0e7ff;
        display: none;
      }

      .info-box.show {
        display: block;
      }

      .info-box strong {
        color: #fff;
      }

      /* Light theme overrides */
      body.light-theme {
        background: linear-gradient(to right, #74ebd5, #acb6e5);
      }

      body.light-theme .container {
        background-color: #fff;
        border: 1px solid #e0e0e0;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      body.light-theme h1 {
        color: #2c3e50;
        text-shadow: none;
      }

      body.light-theme .subtitle {
        color: #555;
      }

      body.light-theme .link-input-section {
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
      }

      body.light-theme .link-input {
        background: #fff;
        border: 1px solid #ddd;
        color: #2c3e50;
      }

      body.light-theme .link-input:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
      }

      body.light-theme .btn {
        background: linear-gradient(to right, #3498db, #2ecc71);
        box-shadow: none;
      }

      body.light-theme .btn:hover {
        background: linear-gradient(to right, #2ecc71, #3498db);
        transform: none;
        box-shadow: none;
      }

      body.light-theme .or-divider {
        color: #888;
      }

      body.light-theme .file-card {
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
      }

      body.light-theme .file-card:hover {
        background-color: #eef7fd;
        border-color: #3498db;
        box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2);
      }

      body.light-theme .file-name {
        color: #2c3e50;
      }

      body.light-theme .file-meta {
        color: #555;
      }

      body.light-theme .connection-status.loading {
        background-color: #d0e7f7;
        border: 1px solid #3498db;
        color: #2c3e50;
      }

      body.light-theme .connection-status.success {
        background-color: #d4edda;
        border: 1px solid #28a745;
        color: #155724;
      }

      body.light-theme .connection-status.error {
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }

      body.light-theme .progress-container {
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
      }

      body.light-theme .progress-bar {
        background-color: #e0e0e0;
        border: none;
      }

      body.light-theme .progress-fill {
        background: linear-gradient(to right, #3498db, #2ecc71);
        box-shadow: none;
      }

      body.light-theme .progress-text {
        color: #2c3e50;
      }

      body.light-theme .progress-details {
        color: #555;
      }

      body.light-theme .theme-toggle {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        box-shadow: 0 4px 8px rgba(245, 158, 11, 0.3);
      }

      body.light-theme .theme-toggle:hover {
        box-shadow: 0 6px 12px rgba(245, 158, 11, 0.4);
        background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      }

      body.light-theme .info-box {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: #fff;
      }

      @media screen and (max-width: 768px) {
        .container {
          margin: 20px;
          padding: 20px;
        }

        h1 {
          font-size: 1.5em;
        }

        .link-input-container {
          grid-template-columns: 1fr;
        }

        .btn {
          font-size: 16px;
          padding: 14px 20px;
        }

        .file-card {
          flex-direction: column;
          align-items: flex-start;
        }

        .file-actions {
          width: 100%;
          margin-left: 0;
          margin-top: 10px;
        }

        .download-btn {
          flex: 1;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
      <div class="theme-toggle-icon" id="themeIcon">
        <svg viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </div>
    </button>

    <div class="container">
      <div class="header">
        <h1>📥 LocalShare Receiver</h1>
        <p class="subtitle">Connect to a file sender and download files</p>
      </div>

      <div id="connectionStatus" class="connection-status" style="display: none;">
        <span class="status-icon" id="statusIcon">⏳</span>
        <span class="status-text" id="statusText">Loading files...</span>
      </div>

      <div id="infoBox" class="info-box" style="display: none;">
        <strong>ℹ️ Connected!</strong> Server: <strong id="serverIP">--</strong>
      </div>

      <div id="filesSection" class="files-section">
        <h2>Available Files</h2>
        <div class="files-grid" id="filesGrid">
          <div class="empty-state">
            <div class="empty-state-icon">⏳</div>
            <div class="empty-state-text">Loading files...</div>
            <div class="empty-state-hint">Please wait while we fetch available files</div>
          </div>
        </div>
      </div>

      <div id="progressContainer" class="progress-container">
        <div class="progress-header">
          <div class="progress-title" id="progressTitle">Downloading...</div>
          <button class="progress-cancel" id="cancelBtn">Cancel</button>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
        <div class="progress-details">
          <span class="progress-size" id="progressSize">0 B / 0 B</span>
          <span>
            <span class="progress-speed" id="progressSpeed">0 B/s</span>
            <span style="margin-left: 10px; color: #94a3b8; font-size: 12px;" id="progressETA">ETA: --:--</span>
          </span>
        </div>
      </div>
    </div>



    <script>
      // Global state
      let currentServerUrl = null;
      let allFiles = [];
      let currentDownloadAbortController = null;

      const connectionStatus = document.getElementById('connectionStatus');
      const statusIcon = document.getElementById('statusIcon');
      const statusText = document.getElementById('statusText');
      const filesSection = document.getElementById('filesSection');
      const filesGrid = document.getElementById('filesGrid');
      const progressContainer = document.getElementById('progressContainer');
      const infoBox = document.getElementById('infoBox');

      // Auto-detect server URL from current page location
      function getServerUrl() {
        // Get the base URL (protocol + hostname + port)
        const protocol = window.location.protocol;
        const hostname = window.location.hostname;
        const port = window.location.port;
        
        if (port) {
          return `${protocol}//${hostname}:${port}`;
        } else {
          return `${protocol}//${hostname}`;
        }
      }

      // Initialize on page load
      async function initializeReceiver() {
        currentServerUrl = getServerUrl();
        
        try {
          // Test connection with health check
          const response = await fetch(`${currentServerUrl}/health`, {
            method: 'GET',
            mode: 'cors'
          });

          if (!response.ok) {
            throw new Error('Server connection failed');
          }

          showConnectionStatus('success', `Connected to ${currentServerUrl}`);
          showInfoBox(currentServerUrl);
          await loadFiles();
        } catch (err) {
          showConnectionStatus('error', `Connection failed: ${err.message}`);
          filesGrid.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">❌</div>
              <div class="empty-state-text">Unable to connect</div>
              <div class="empty-state-hint">${err.message}</div>
            </div>
          `;
        }
      }

      // Show connection status
      function showConnectionStatus(type, message) {
        connectionStatus.style.display = 'flex';
        connectionStatus.className = `connection-status ${type}`;
        statusText.textContent = message;
        
        if (type === 'loading') {
          statusIcon.textContent = '⏳';
        } else if (type === 'success') {
          statusIcon.textContent = '✓';
        } else if (type === 'error') {
          statusIcon.textContent = '✕';
        }
      }

      // Show info box
      function showInfoBox(url) {
        try {
          const urlObj = new URL(url);
          document.getElementById('serverIP').textContent = `${urlObj.hostname}:${urlObj.port || 80}`;
        } catch {
          document.getElementById('serverIP').textContent = url;
        }
        infoBox.classList.add('show');
      }

      // Load files from server
      async function loadFiles() {
        try {
          const response = await fetch(`${currentServerUrl}/files`, {
            method: 'GET',
            mode: 'cors'
          });

          if (!response.ok) {
            throw new Error('Failed to fetch files');
          }

          const data = await response.json();
          allFiles = data.files || [];
          displayFiles();
        } catch (err) {
          console.error('Error loading files:', err);
          filesGrid.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">⚠️</div>
              <div class="empty-state-text">Error loading files</div>
              <div class="empty-state-hint">${err.message}</div>
            </div>
          `;
        }
      }

      // Display files in grid
      function displayFiles() {
        filesGrid.innerHTML = '';

        if (allFiles.length === 0) {
          filesGrid.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📁</div>
              <div class="empty-state-text">No files available</div>
              <div class="empty-state-hint">Sender hasn't shared any files yet</div>
            </div>
          `;
          return;
        }

        allFiles.forEach((file) => {
          const fileCard = document.createElement('div');
          fileCard.className = 'file-card';
          fileCard.innerHTML = `
            <div class="file-info">
              <div class="file-name" title="${file.name}">${file.name}</div>
              <div class="file-meta">
                <span>${formatBytes(file.size)}</span>
                ${file.sharedAt ? `<span>${formatDate(file.sharedAt)}</span>` : ''}
              </div>
            </div>
            <div class="file-actions">
              <button class="download-btn" onclick="downloadFile('${file.id}', '${file.name}', ${file.size})">
                ⬇ Download
              </button>
            </div>
          `;
          filesGrid.appendChild(fileCard);
        });
      }

      // Download file
      async function downloadFile(fileId, fileName, fileSize) {
        if (!currentServerUrl) {
          showStatus('Not connected to a server', 'error');
          return;
        }

        currentDownloadAbortController = new AbortController();
        const downloadUrl = `${currentServerUrl}/file/${fileId}`;
        
        progressContainer.style.display = 'block';
        document.getElementById('progressTitle').textContent = `Downloading: ${fileName}`;
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressText').textContent = '0%';
        document.getElementById('progressSize').textContent = `0 B / ${formatBytes(fileSize)}`;
        document.getElementById('progressSpeed').textContent = '0 B/s';
        document.getElementById('progressETA').textContent = 'ETA: --:--';

        try {
          const response = await fetch(downloadUrl, {
            signal: currentDownloadAbortController.signal,
            mode: 'cors'
          });

          if (!response.ok) {
            throw new Error(`Server returned ${response.status}`);
          }

          const reader = response.body.getReader();
          const chunks = [];
          let receivedLength = 0;
          let startTime = Date.now();
          let lastUpdate = startTime;

          while (true) {
            try {
              const { done, value } = await reader.read();

              if (done) break;

              chunks.push(value);
              receivedLength += value.length;

              const now = Date.now();
              if (now - lastUpdate >= 100) {
                updateDownloadProgress(receivedLength, fileSize, startTime, lastUpdate, now);
                lastUpdate = now;
              }
            } catch (err) {
              if (err.name === 'AbortError') {
                console.log('Download cancelled');
                return;
              }
              throw err;
            }
          }

          // Complete the download
          updateDownloadProgress(receivedLength, fileSize, startTime, lastUpdate, Date.now());
          
          // Create blob and download
          const blob = new Blob(chunks);
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);

          setTimeout(() => {
            progressContainer.style.display = 'none';
          }, 2000);
        } catch (err) {
          if (err.name !== 'AbortError') {
            showStatus(`Download failed: ${err.message}`, 'error');
            progressContainer.style.display = 'none';
          }
        }
      }

      // Update download progress
      function updateDownloadProgress(received, total, startTime, lastTime, now) {
        const percent = (received / total) * 100;
        const timeDiff = now - lastTime;
        const elapsedSeconds = (now - startTime) / 1000;

        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressText').textContent = Math.round(percent) + '%';
        document.getElementById('progressSize').textContent = `${formatBytes(received)} / ${formatBytes(total)}`;

        if (timeDiff > 0) {
          const speed = (received / elapsedSeconds);
          document.getElementById('progressSpeed').textContent = formatBytes(speed) + '/s';

          if (speed > 0) {
            const remaining = total - received;
            const eta = remaining / speed;
            document.getElementById('progressETA').textContent = formatETA(eta);
          }
        }
      }

      // Cancel download
      document.getElementById('cancelBtn').addEventListener('click', () => {
        if (currentDownloadAbortController) {
          currentDownloadAbortController.abort();
          progressContainer.style.display = 'none';
        }
      });

      // Format bytes
      function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
      }

      // Format date
      function formatDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        
        return date.toLocaleDateString();
      }

      // Format ETA
      function formatETA(seconds) {
        if (seconds <= 0) return 'ETA: 0s';
        if (seconds < 60) return `ETA: ${Math.round(seconds)}s`;
        const mins = Math.floor(seconds / 60);
        const secs = Math.round(seconds % 60);
        return `ETA: ${mins}m ${secs}s`;
      }

      // Show status message
      function showStatus(message, type) {
        alert(`[${type.toUpperCase()}] ${message}`);
      }

      // Theme toggle
      const themeToggle = document.getElementById('themeToggle');
      const body = document.body;

      themeToggle.addEventListener('click', () => {
        body.classList.toggle('light-theme');
        const isLight = body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        updateThemeIcon(isLight);
      });

      function updateThemeIcon(isLight) {
        const icon = document.getElementById('themeIcon');
        if (isLight) {
          icon.innerHTML = `
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          `;
        } else {
          icon.innerHTML = `
            <svg viewBox="0 0 24 24">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          `;
        }
      }

      // Load saved theme
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        body.classList.add('light-theme');
        updateThemeIcon(true);
      } else {
        updateThemeIcon(false);
      }

      // Initialize the receiver on page load
      window.addEventListener('load', () => {
        initializeReceiver();
      });
    </script>
  </body>
</html>
